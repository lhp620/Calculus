/* ── App styles ── */
/* ============================================================
   ALGEBRA 2 LEARNING — GLOBAL DESIGN SYSTEM
   ============================================================ */

/* --- Google Fonts --- */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap');

/* --- CSS Custom Properties --- */
:root {
  /* Primary palette */
  --color-bg-primary: #0f172a;
  --color-bg-secondary: #1a2540;
  --color-bg-card: rgba(30, 41, 64, 0.85);
  --color-bg-card-hover: rgba(42, 58, 88, 0.9);
  --color-surface: #253354;
  --color-border: rgba(148, 163, 184, 0.25);
  --color-border-hover: rgba(148, 163, 184, 0.45);

  /* Accent Colors */
  --color-violet: #7c3aed;
  --color-violet-light: #a78bfa;
  --color-violet-glow: rgba(124, 58, 237, 0.3);
  --color-cyan: #06b6d4;
  --color-cyan-light: #67e8f9;
  --color-cyan-glow: rgba(6, 182, 212, 0.25);
  --color-amber: #f59e0b;
  --color-amber-light: #fbbf24;
  --color-rose: #f43f5e;
  --color-rose-light: #fb7185;
  --color-emerald: #10b981;
  --color-emerald-light: #34d399;
  --color-blue: #3b82f6;
  --color-blue-light: #60a5fa;
  --color-pink: #ec4899;
  --color-pink-light: #f472b6;
  --color-orange: #f97316;
  --color-orange-light: #fb923c;
  --color-indigo: #6366f1;
  --color-indigo-light: #818cf8;
  --color-teal: #14b8a6;
  --color-teal-light: #2dd4bf;

  /* Text */
  --color-text-primary: #f8fafc;
  --color-text-secondary: #c4d0de;
  --color-text-muted: #8fa0b4;
  --color-text-accent: var(--color-violet-light);

  /* Success / Error */
  --color-success: var(--color-emerald);
  --color-error: var(--color-rose);
  --color-warning: var(--color-amber);

  /* Typography */
  --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-heading: 'Space Grotesk', 'Inter', sans-serif;

  /* Sizing */
  --max-width: 1280px;
  --max-width-lesson: 860px;
  --header-height: 64px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 24px;

  /* Shadows */
  --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
  --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
  --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
  --shadow-glow-violet: 0 0 20px var(--color-violet-glow);
  --shadow-glow-cyan: 0 0 20px var(--color-cyan-glow);

  /* Transitions */
  --transition-fast: 0.15s ease;
  --transition-base: 0.25s ease;
  --transition-slow: 0.4s cubic-bezier(0.4, 0, 0.2, 1);

  /* Glassmorphism */
  --glass-bg: rgba(20, 32, 58, 0.80);
  --glass-border: rgba(148, 163, 184, 0.22);
  --glass-blur: blur(16px);
}

/* --- Reset & Base --- */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
  font-size: 16px;
}

body {
  font-family: var(--font-body);
  background: var(--color-bg-primary);
  color: var(--color-text-primary);
  line-height: 1.7;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* Animated gradient background */
body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background:
    radial-gradient(ellipse 80% 50% at 20% 20%, rgba(124, 58, 237, 0.18) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 80%, rgba(6, 182, 212, 0.14) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 50% 50%, rgba(99, 102, 241, 0.10) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

a {
  color: var(--color-violet-light);
  text-decoration: none;
  transition: color var(--transition-fast);
}
a:hover { color: var(--color-cyan-light); }

img { max-width: 100%; display: block; }

/* --- Typography --- */
h1, h2, h3, h4, h5, h6 {
  font-family: var(--font-heading);
  font-weight: 600;
  line-height: 1.3;
  color: var(--color-text-primary);
}

h1 { font-size: 2.5rem; letter-spacing: -0.03em; }
h2 { font-size: 1.75rem; letter-spacing: -0.02em; }
h3 { font-size: 1.35rem; letter-spacing: -0.01em; }
h4 { font-size: 1.1rem; }

p { color: var(--color-text-secondary); margin-bottom: 1rem; }

/* --- Layout --- */
.container {
  width: 100%;
  max-width: var(--max-width);
  margin: 0 auto;
  padding: 0 24px;
  position: relative;
  z-index: 1;
}

.lesson-container {
  max-width: var(--max-width-lesson);
  margin: 0 auto;
  padding: 0 24px;
  position: relative;
  z-index: 1;
}

/* ============================================================
   HEADER / NAVIGATION
   ============================================================ */
.site-header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: var(--header-height);
  background: var(--glass-bg);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border-bottom: 1px solid var(--glass-border);
  z-index: 100;
  display: flex;
  align-items: center;
}

.header-inner {
  width: 100%;
  max-width: var(--max-width);
  margin: 0 auto;
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--font-heading);
  font-weight: 700;
  font-size: 1.25rem;
  color: var(--color-text-primary);
  text-decoration: none;
}

.logo-icon {
  width: 36px;
  height: 36px;
  background: linear-gradient(135deg, var(--color-violet), var(--color-cyan));
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  font-weight: 700;
  color: white;
}

.header-nav {
  display: flex;
  align-items: center;
  gap: 8px;
}

.nav-link {
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  color: var(--color-text-secondary);
  font-size: 0.9rem;
  font-weight: 500;
  transition: all var(--transition-fast);
  text-decoration: none;
}
.nav-link:hover {
  color: var(--color-text-primary);
  background: rgba(148, 163, 184, 0.08);
}
.nav-link.active {
  color: var(--color-violet-light);
  background: rgba(124, 58, 237, 0.1);
}

.nav-progress {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 14px;
  background: rgba(124, 58, 237, 0.1);
  border: 1px solid rgba(124, 58, 237, 0.2);
  border-radius: 20px;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--color-violet-light);
}

.nav-progress-ring {
  width: 20px;
  height: 20px;
}

/* Main content offset for fixed header */
main {
  padding-top: var(--header-height);
  min-height: 100vh;
}

/* ============================================================
   HERO SECTION
   ============================================================ */
.hero {
  padding: 80px 0 60px;
  text-align: center;
  position: relative;
}

.hero::before {
  content: '';
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(124, 58, 237, 0.12) 0%, transparent 70%);
  pointer-events: none;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 16px;
  background: rgba(124, 58, 237, 0.12);
  border: 1px solid rgba(124, 58, 237, 0.25);
  border-radius: 20px;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--color-violet-light);
  margin-bottom: 24px;
  animation: fadeInDown 0.6s ease;
}

.hero h1 {
  font-size: 3.5rem;
  font-weight: 700;
  background: linear-gradient(135deg, var(--color-text-primary) 0%, var(--color-violet-light) 50%, var(--color-cyan-light) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 16px;
  animation: fadeInDown 0.6s ease 0.1s both;
}

.hero-subtitle {
  font-size: 1.2rem;
  color: var(--color-text-secondary);
  max-width: 600px;
  margin: 0 auto 32px;
  animation: fadeInDown 0.6s ease 0.2s both;
}

.hero-stats {
  display: flex;
  justify-content: center;
  gap: 48px;
  animation: fadeInUp 0.6s ease 0.3s both;
}

.hero-stat {
  text-align: center;
}

.hero-stat-value {
  font-family: var(--font-heading);
  font-size: 2rem;
  font-weight: 700;
  color: var(--color-text-primary);
}

.hero-stat-value.violet { color: var(--color-violet-light); }
.hero-stat-value.cyan { color: var(--color-cyan-light); }
.hero-stat-value.amber { color: var(--color-amber-light); }

.hero-stat-label {
  font-size: 0.8rem;
  color: var(--color-text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-top: 4px;
}

/* ============================================================
   UNIT CARDS GRID
   ============================================================ */
.units-section {
  padding: 40px 0 80px;
}

.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 32px;
}

.section-title {
  font-size: 1.5rem;
  color: var(--color-text-primary);
}

.section-subtitle {
  color: var(--color-text-muted);
  font-size: 0.9rem;
}

.units-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 20px;
}

.unit-card {
  position: relative;
  background: var(--color-bg-card);
  backdrop-filter: var(--glass-blur);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: 28px;
  cursor: pointer;
  transition: all var(--transition-base);
  overflow: hidden;
  text-decoration: none;
  display: block;
}

.unit-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: var(--unit-accent, var(--color-violet));
  opacity: 0.7;
  transition: opacity var(--transition-fast);
}

.unit-card:hover {
  background: var(--color-bg-card-hover);
  border-color: var(--color-border-hover);
  transform: translateY(-4px);
  box-shadow: var(--shadow-lg);
}
.unit-card:hover::before { opacity: 1; }

.unit-card-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 16px;
}

.unit-number {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 44px;
  height: 44px;
  border-radius: var(--radius-md);
  font-family: var(--font-heading);
  font-size: 1.1rem;
  font-weight: 700;
  color: white;
  background: var(--unit-accent, var(--color-violet));
  flex-shrink: 0;
}

.unit-lesson-count {
  font-size: 0.75rem;
  color: var(--color-text-muted);
  padding: 4px 10px;
  background: rgba(148, 163, 184, 0.08);
  border-radius: 12px;
}

.unit-card h3 {
  font-size: 1.15rem;
  margin-bottom: 8px;
  color: var(--color-text-primary);
}

.unit-card p {
  font-size: 0.85rem;
  color: var(--color-text-muted);
  margin-bottom: 16px;
  line-height: 1.5;
}

.unit-progress-bar {
  width: 100%;
  height: 4px;
  background: rgba(148, 163, 184, 0.1);
  border-radius: 2px;
  overflow: hidden;
}

.unit-progress-fill {
  height: 100%;
  background: var(--unit-accent, var(--color-violet));
  border-radius: 2px;
  transition: width var(--transition-slow);
  width: 0%;
}

/* Unit accent colors */
.unit-card[data-unit="1"]  { --unit-accent: var(--color-violet); }
.unit-card[data-unit="2"]  { --unit-accent: var(--color-blue); }
.unit-card[data-unit="3"]  { --unit-accent: var(--color-cyan); }
.unit-card[data-unit="4"]  { --unit-accent: var(--color-teal); }
.unit-card[data-unit="5"]  { --unit-accent: var(--color-emerald); }
.unit-card[data-unit="6"]  { --unit-accent: var(--color-amber); }
.unit-card[data-unit="7"]  { --unit-accent: var(--color-orange); }
.unit-card[data-unit="8"]  { --unit-accent: var(--color-rose); }
.unit-card[data-unit="9"]  { --unit-accent: var(--color-pink); }
.unit-card[data-unit="10"] { --unit-accent: var(--color-indigo); }
.unit-card[data-unit="11"] { --unit-accent: var(--color-blue); }

/* ============================================================
   UNIT PAGE
   ============================================================ */
.unit-hero {
  padding: 48px 0 32px;
}

.breadcrumb {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.85rem;
  color: var(--color-text-muted);
  margin-bottom: 20px;
}

.breadcrumb a {
  color: var(--color-text-muted);
  transition: color var(--transition-fast);
}
.breadcrumb a:hover { color: var(--color-violet-light); }
.breadcrumb .sep { opacity: 0.4; }

.unit-hero-header {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-bottom: 12px;
}

.unit-hero-icon {
  width: 56px;
  height: 56px;
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-heading);
  font-size: 1.4rem;
  font-weight: 700;
  color: white;
  flex-shrink: 0;
}

.unit-hero h1 {
  font-size: 2rem;
  background: none;
  -webkit-text-fill-color: var(--color-text-primary);
}

.unit-hero p {
  font-size: 1rem;
  max-width: 640px;
}

.unit-progress-overview {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px 20px;
  background: var(--color-bg-card);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  margin-top: 24px;
}

.unit-progress-overview .progress-bar-wide {
  flex: 1;
  height: 8px;
  background: rgba(148, 163, 184, 0.1);
  border-radius: 4px;
  overflow: hidden;
}

.unit-progress-overview .progress-fill-wide {
  height: 100%;
  border-radius: 4px;
  transition: width var(--transition-slow);
}

.unit-progress-text {
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--color-text-secondary);
  white-space: nowrap;
}

/* Lesson list */
.lessons-list {
  padding: 0 0 80px;
}

.lesson-item {
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 20px 24px;
  background: var(--color-bg-card);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  margin-bottom: 12px;
  cursor: pointer;
  transition: all var(--transition-base);
  text-decoration: none;
}

.lesson-item:hover {
  background: var(--color-bg-card-hover);
  border-color: var(--color-border-hover);
  transform: translateX(4px);
}

.lesson-number {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-heading);
  font-weight: 700;
  font-size: 0.85rem;
  flex-shrink: 0;
  border: 2px solid var(--color-border);
  color: var(--color-text-muted);
  transition: all var(--transition-base);
}

.lesson-item:hover .lesson-number {
  border-color: var(--unit-accent, var(--color-violet));
  color: var(--unit-accent, var(--color-violet));
}

.lesson-item.completed .lesson-number {
  background: var(--color-emerald);
  border-color: var(--color-emerald);
  color: white;
}

.lesson-info {
  flex: 1;
}

.lesson-info h4 {
  font-size: 1rem;
  margin-bottom: 2px;
  color: var(--color-text-primary);
}

.lesson-info p {
  font-size: 0.8rem;
  color: var(--color-text-muted);
  margin: 0;
}

.lesson-arrow {
  color: var(--color-text-muted);
  font-size: 1.2rem;
  transition: transform var(--transition-fast);
}
.lesson-item:hover .lesson-arrow {
  transform: translateX(4px);
  color: var(--unit-accent, var(--color-violet));
}

/* ============================================================
   LESSON PAGE
   ============================================================ */
.lesson-page {
  padding: 40px 0 80px;
}

.lesson-header {
  margin-bottom: 40px;
}

.lesson-header h1 {
  font-size: 2rem;
  margin-bottom: 8px;
  background: none;
  -webkit-text-fill-color: var(--color-text-primary);
}

.lesson-nav {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 24px;
}

.lesson-tab {
  padding: 8px 18px;
  border-radius: 20px;
  font-size: 0.85rem;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--color-border);
  background: transparent;
  color: var(--color-text-secondary);
  transition: all var(--transition-fast);
}

.lesson-tab:hover {
  border-color: var(--color-border-hover);
  color: var(--color-text-primary);
}

.lesson-tab.active {
  background: var(--color-violet);
  border-color: var(--color-violet);
  color: white;
}

/* Lesson Sections */
.lesson-section {
  display: none;
  animation: fadeIn 0.3s ease;
}

.lesson-section.active {
  display: block;
}

.concept-card {
  background: var(--color-bg-card);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: 32px;
  margin-bottom: 24px;
}

.concept-card h2 {
  font-size: 1.4rem;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.concept-card h3 {
  font-size: 1.1rem;
  margin: 24px 0 12px;
  color: var(--color-text-primary);
}

.concept-card p,
.concept-card li {
  font-size: 0.95rem;
  color: var(--color-text-secondary);
  line-height: 1.8;
}

.concept-card ul,
.concept-card ol {
  margin: 12px 0;
  padding-left: 24px;
}

.concept-card li { margin-bottom: 8px; }

/* Key formula highlight box */
.formula-box {
  background: rgba(124, 58, 237, 0.08);
  border: 1px solid rgba(124, 58, 237, 0.2);
  border-radius: var(--radius-md);
  padding: 20px 24px;
  margin: 20px 0;
  text-align: center;
}

.formula-box .katex {
  font-size: 1.4rem;
}

.formula-label {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--color-violet-light);
  margin-bottom: 8px;
  font-weight: 600;
}

/* Tip / Note boxes */
.tip-box {
  display: flex;
  gap: 12px;
  padding: 16px 20px;
  background: rgba(6, 182, 212, 0.06);
  border: 1px solid rgba(6, 182, 212, 0.15);
  border-left: 3px solid var(--color-cyan);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  margin: 20px 0;
}

.tip-box .tip-icon { font-size: 1.2rem; flex-shrink: 0; }

.tip-box p {
  color: var(--color-text-secondary);
  margin: 0;
  font-size: 0.9rem;
}

.warning-box {
  display: flex;
  gap: 12px;
  padding: 16px 20px;
  background: rgba(245, 158, 11, 0.06);
  border: 1px solid rgba(245, 158, 11, 0.15);
  border-left: 3px solid var(--color-amber);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  margin: 20px 0;
}

.warning-box .warning-icon { font-size: 1.2rem; flex-shrink: 0; }
.warning-box p { color: var(--color-text-secondary); margin: 0; font-size: 0.9rem; }

/* Example steps */
.example-step {
  background: var(--color-bg-card);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: 24px 28px;
  margin-bottom: 16px;
}

.example-step h4 {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
  color: var(--color-cyan-light);
  font-size: 0.95rem;
}

.step-number {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: var(--color-cyan);
  color: white;
  font-size: 0.75rem;
  font-weight: 700;
  flex-shrink: 0;
}

/* ============================================================
   QUIZ / PRACTICE ENGINE
   ============================================================ */
.quiz-container {
  max-width: 700px;
}

.quiz-progress {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 24px;
}

.quiz-progress-bar {
  flex: 1;
  height: 6px;
  background: rgba(148, 163, 184, 0.1);
  border-radius: 3px;
  overflow: hidden;
}

.quiz-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--color-violet), var(--color-cyan));
  border-radius: 3px;
  transition: width var(--transition-slow);
}

.quiz-progress-text {
  font-size: 0.8rem;
  color: var(--color-text-muted);
  font-weight: 600;
  white-space: nowrap;
}

.quiz-question {
  background: var(--color-bg-card);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: 32px;
  margin-bottom: 20px;
  animation: fadeIn 0.3s ease;
}

.quiz-question h3 {
  margin-bottom: 20px;
  font-size: 1.1rem;
}

.quiz-question .question-text {
  font-size: 1rem;
  color: var(--color-text-primary);
  margin-bottom: 24px;
  line-height: 1.8;
}

/* Multiple choice */
.quiz-options {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.quiz-option {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 20px;
  background: rgba(148, 163, 184, 0.04);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: all var(--transition-fast);
  font-size: 0.95rem;
  color: var(--color-text-secondary);
}

.quiz-option:hover {
  background: rgba(148, 163, 184, 0.08);
  border-color: var(--color-border-hover);
  color: var(--color-text-primary);
}

.quiz-option.selected {
  border-color: var(--color-violet);
  background: rgba(124, 58, 237, 0.08);
  color: var(--color-text-primary);
}

.quiz-option.correct {
  border-color: var(--color-emerald);
  background: rgba(16, 185, 129, 0.08);
  color: var(--color-emerald-light);
}

.quiz-option.incorrect {
  border-color: var(--color-rose);
  background: rgba(244, 63, 94, 0.08);
  color: var(--color-rose-light);
}

.option-letter {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 2px solid var(--color-border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  font-size: 0.8rem;
  flex-shrink: 0;
  transition: all var(--transition-fast);
}

.quiz-option.selected .option-letter {
  border-color: var(--color-violet);
  background: var(--color-violet);
  color: white;
}

.quiz-option.correct .option-letter {
  border-color: var(--color-emerald);
  background: var(--color-emerald);
  color: white;
}

.quiz-option.incorrect .option-letter {
  border-color: var(--color-rose);
  background: var(--color-rose);
  color: white;
}

/* Fill-in-the-blank */
.quiz-input-group {
  display: flex;
  gap: 12px;
  align-items: center;
}

.quiz-input {
  flex: 1;
  padding: 12px 18px;
  background: rgba(148, 163, 184, 0.06);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  color: var(--color-text-primary);
  font-family: var(--font-body);
  font-size: 1rem;
  outline: none;
  transition: border-color var(--transition-fast);
}

.quiz-input:focus {
  border-color: var(--color-violet);
}

.quiz-input.correct { border-color: var(--color-emerald); }
.quiz-input.incorrect { border-color: var(--color-rose); }

/* Feedback */
.quiz-feedback {
  padding: 16px 20px;
  border-radius: var(--radius-md);
  margin-top: 16px;
  font-size: 0.9rem;
  display: none;
  animation: fadeIn 0.3s ease;
}

.quiz-feedback.show { display: block; }

.quiz-feedback.correct {
  background: rgba(16, 185, 129, 0.08);
  border: 1px solid rgba(16, 185, 129, 0.2);
  color: var(--color-emerald-light);
}

.quiz-feedback.incorrect {
  background: rgba(244, 63, 94, 0.08);
  border: 1px solid rgba(244, 63, 94, 0.2);
  color: var(--color-rose-light);
}

/* Quiz buttons */
.quiz-actions {
  display: flex;
  gap: 12px;
  margin-top: 20px;
}

/* Score card */
.quiz-score {
  text-align: center;
  padding: 40px;
  animation: fadeIn 0.4s ease;
}

.quiz-score-ring {
  width: 120px;
  height: 120px;
  margin: 0 auto 20px;
}

.quiz-score h2 {
  font-size: 1.5rem;
  margin-bottom: 8px;
}

.quiz-score p {
  color: var(--color-text-muted);
}

/* ============================================================
   BUTTONS
   ============================================================ */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 10px 24px;
  border-radius: var(--radius-sm);
  font-family: var(--font-body);
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all var(--transition-fast);
  text-decoration: none;
}

.btn-primary {
  background: linear-gradient(135deg, var(--color-violet), #6d28d9);
  color: white;
  box-shadow: 0 2px 8px rgba(124, 58, 237, 0.3);
}
.btn-primary:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(124, 58, 237, 0.4);
  color: white;
}

.btn-secondary {
  background: rgba(148, 163, 184, 0.08);
  border: 1px solid var(--color-border);
  color: var(--color-text-secondary);
}
.btn-secondary:hover {
  background: rgba(148, 163, 184, 0.14);
  color: var(--color-text-primary);
}

.btn-success {
  background: linear-gradient(135deg, var(--color-emerald), #059669);
  color: white;
}

.btn-sm {
  padding: 6px 14px;
  font-size: 0.8rem;
}

.btn-lg {
  padding: 14px 32px;
  font-size: 1rem;
}

/* ============================================================
   FORMULA SHEET PAGE
   ============================================================ */
.formula-search {
  position: relative;
  margin-bottom: 32px;
}

.formula-search input {
  width: 100%;
  padding: 14px 20px 14px 48px;
  background: var(--color-bg-card);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  color: var(--color-text-primary);
  font-size: 1rem;
  font-family: var(--font-body);
  outline: none;
  transition: border-color var(--transition-fast);
}

.formula-search input:focus {
  border-color: var(--color-violet);
}

.formula-search .search-icon {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--color-text-muted);
  font-size: 1.1rem;
}

.formula-grid {
  display: grid;
  gap: 16px;
}

.formula-card {
  background: var(--color-bg-card);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: 24px;
  transition: all var(--transition-base);
}

.formula-card:hover {
  border-color: var(--color-border-hover);
}

.formula-card h4 {
  font-size: 0.95rem;
  color: var(--color-violet-light);
  margin-bottom: 12px;
}

.formula-card .katex { font-size: 1.2rem; }

.formula-card p {
  font-size: 0.85rem;
  color: var(--color-text-muted);
  margin-top: 8px;
  margin-bottom: 0;
}

/* ============================================================
   FOOTER
   ============================================================ */
.site-footer {
  padding: 40px 0;
  border-top: 1px solid var(--color-border);
  text-align: center;
  position: relative;
  z-index: 1;
}

.site-footer p {
  font-size: 0.85rem;
  color: var(--color-text-muted);
}

/* ============================================================
   ANIMATIONS
   ============================================================ */
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes fadeInDown {
  from { opacity: 0; transform: translateY(-12px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes slideInLeft {
  from { opacity: 0; transform: translateX(-20px); }
  to { opacity: 1; transform: translateX(0); }
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}

@keyframes float {
  0%, 100% { transform: translateY(0px); }
  50% { transform: translateY(-6px); }
}

/* Staggered card animations */
.unit-card { animation: fadeInUp 0.4s ease backwards; }
.unit-card:nth-child(1)  { animation-delay: 0.05s; }
.unit-card:nth-child(2)  { animation-delay: 0.10s; }
.unit-card:nth-child(3)  { animation-delay: 0.15s; }
.unit-card:nth-child(4)  { animation-delay: 0.20s; }
.unit-card:nth-child(5)  { animation-delay: 0.25s; }
.unit-card:nth-child(6)  { animation-delay: 0.30s; }
.unit-card:nth-child(7)  { animation-delay: 0.35s; }
.unit-card:nth-child(8)  { animation-delay: 0.40s; }
.unit-card:nth-child(9)  { animation-delay: 0.45s; }
.unit-card:nth-child(10) { animation-delay: 0.50s; }
.unit-card:nth-child(11) { animation-delay: 0.55s; }

.lesson-item { animation: slideInLeft 0.3s ease backwards; }
.lesson-item:nth-child(1) { animation-delay: 0.05s; }
.lesson-item:nth-child(2) { animation-delay: 0.10s; }
.lesson-item:nth-child(3) { animation-delay: 0.15s; }
.lesson-item:nth-child(4) { animation-delay: 0.20s; }
.lesson-item:nth-child(5) { animation-delay: 0.25s; }
.lesson-item:nth-child(6) { animation-delay: 0.30s; }
.lesson-item:nth-child(7) { animation-delay: 0.35s; }

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width: 768px) {
  h1 { font-size: 1.8rem; }
  .hero h1 { font-size: 2.2rem; }
  .hero { padding: 48px 0 40px; }
  .hero-stats { gap: 24px; }
  .hero-stat-value { font-size: 1.5rem; }
  .units-grid { grid-template-columns: 1fr; }
  .header-nav { display: none; }
  .unit-card { padding: 20px; }
  .lesson-tab { padding: 6px 14px; font-size: 0.8rem; }
  .concept-card { padding: 20px; }
}

@media (max-width: 480px) {
  .container, .lesson-container { padding: 0 16px; }
  .hero h1 { font-size: 1.8rem; }
  .hero-subtitle { font-size: 1rem; }
  .hero-stats { flex-direction: column; gap: 12px; }
}

/* ============================================================
   KATEX SIZE OVERRIDES
   ============================================================ */
.katex { font-size: 1.1em; }
.concept-card .katex { font-size: 1.05em; }
.formula-box .katex { font-size: 1.3em; }
.quiz-question .katex { font-size: 1.1em; }

/* ============================================================
   ACCESSIBILITY — SKIP LINK & FOCUS RINGS
   ============================================================ */
.skip-link {
  position: absolute;
  top: -100px;
  left: 16px;
  z-index: 9999;
  padding: 8px 20px;
  background: var(--color-violet);
  color: #fff;
  font-weight: 600;
  font-size: 0.9rem;
  border-radius: 0 0 var(--radius-sm) var(--radius-sm);
  text-decoration: none;
  transition: top 0.2s ease;
}
.skip-link:focus {
  top: 0;
  outline: 3px solid var(--color-violet-light);
  outline-offset: 2px;
}

/* Global visible focus rings */
:focus-visible {
  outline: 2px solid var(--color-violet-light);
  outline-offset: 3px;
  border-radius: 4px;
}

.btn:focus-visible,
.quiz-option:focus-visible,
.lesson-tab:focus-visible,
.nav-link:focus-visible,
.unit-card:focus-visible,
.lesson-item:focus-visible {
  outline: 2px solid var(--color-violet-light);
  outline-offset: 3px;
}

/* ============================================================
   MOBILE HAMBURGER MENU
   ============================================================ */
.header-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

.mobile-menu-btn {
  display: none;
  flex-direction: column;
  justify-content: center;
  gap: 5px;
  width: 36px;
  height: 36px;
  padding: 6px;
  background: none;
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  cursor: pointer;
}

.mobile-menu-btn span {
  display: block;
  width: 100%;
  height: 2px;
  background: var(--color-text-secondary);
  border-radius: 2px;
  transition: all 0.25s ease;
  transform-origin: center;
}

.mobile-menu-btn.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.mobile-menu-btn.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
.mobile-menu-btn.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

@media (max-width: 768px) {
  .mobile-menu-btn { display: flex; }

  .header-nav {
    display: none;
    position: absolute;
    top: 64px;
    left: 0;
    right: 0;
    flex-direction: column;
    background: rgba(15, 23, 42, 0.97);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--color-border);
    padding: 16px 24px 24px;
    gap: 4px;
    z-index: 98;
    animation: fadeInDown 0.2s ease;
  }
  .header-nav.open { display: flex; }
  .header-nav .nav-link {
    padding: 12px 8px;
    font-size: 1rem;
    border-bottom: 1px solid var(--color-border);
  }
  .header-nav .nav-link:last-child { border-bottom: none; }
}

/* ============================================================
   RESPONSIVE — ADDITIONAL FIXES
   ============================================================ */
@media (max-width: 768px) {
  .quiz-progress {
    flex-direction: column;
    align-items: flex-start;
    gap: 8px;
  }
  .quiz-actions { flex-direction: column; }
  .quiz-actions .btn { width: 100%; justify-content: center; }

  .lesson-nav { gap: 4px; }

  .formula-grid { grid-template-columns: 1fr; }

  .grapher-wrap { flex-direction: column; height: auto; }
  .grapher-sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--color-border); max-height: 300px; overflow-y: auto; }
  .grapher-canvas-area { height: 400px; }
}

@media (max-width: 480px) {
  .lesson-tab { padding: 5px 10px; font-size: 0.78rem; }
  .unit-hero { padding: 24px 0; }
  .quiz-score { padding: 24px 16px; }
}

/* ============================================================
   FUNCTION GRAPHER
   ============================================================ */
.grapher-wrap {
  display: flex;
  gap: 0;
  height: 560px;
  border-radius: var(--radius-lg);
  border: 1px solid var(--color-border);
  overflow: hidden;
  background: var(--color-bg-card);
}

.grapher-sidebar {
  width: 260px;
  flex-shrink: 0;
  border-right: 1px solid var(--color-border);
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  overflow-y: auto;
}

.grapher-title {
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--color-text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin: 0;
}

.grapher-fn-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.grapher-fn-row {
  display: flex;
  align-items: center;
  gap: 8px;
}

.grapher-fn-swatch {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  flex-shrink: 0;
}

.grapher-fn-prefix {
  font-size: 0.82rem;
  color: var(--color-text-muted);
  flex-shrink: 0;
}

.grapher-fn-input {
  flex: 1;
  min-width: 0;
  padding: 6px 10px;
  background: rgba(148, 163, 184, 0.06);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  color: var(--color-text-primary);
  font-family: 'JetBrains Mono', 'Fira Code', monospace, var(--font-body);
  font-size: 0.85rem;
  outline: none;
  transition: border-color var(--transition-fast);
}
.grapher-fn-input:focus { border-color: var(--color-violet); }

.grapher-fn-remove {
  flex-shrink: 0;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: none;
  background: rgba(244, 63, 94, 0.12);
  color: var(--color-rose);
  cursor: pointer;
  font-size: 1rem;
  line-height: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background var(--transition-fast);
}
.grapher-fn-remove:hover { background: rgba(244, 63, 94, 0.25); }

.grapher-fn-error {
  font-size: 0.72rem;
  color: var(--color-rose);
  margin-top: 2px;
}

.grapher-presets-label {
  font-size: 0.78rem;
  color: var(--color-text-muted);
  margin: 4px 0 4px;
}

.grapher-presets {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.grapher-preset-btn {
  text-align: left;
  padding: 5px 10px;
  background: rgba(148, 163, 184, 0.04);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  color: var(--color-violet-light);
  font-family: 'JetBrains Mono', monospace, var(--font-body);
  font-size: 0.82rem;
  cursor: pointer;
  transition: all var(--transition-fast);
}
.grapher-preset-btn:hover {
  background: rgba(124, 58, 237, 0.08);
  border-color: var(--color-violet);
}

.grapher-canvas-area {
  flex: 1;
  position: relative;
  min-width: 0;
}

#graph-canvas {
  display: block;
  width: 100%;
  height: 100%;
  cursor: crosshair;
}

.grapher-zoom-controls {
  position: absolute;
  top: 12px;
  right: 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.grapher-ctrl-btn {
  width: 32px;
  height: 32px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--color-border);
  background: rgba(15, 23, 42, 0.8);
  backdrop-filter: blur(8px);
  color: var(--color-text-secondary);
  font-size: 1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition-fast);
}
.grapher-ctrl-btn:hover {
  background: rgba(124, 58, 237, 0.15);
  border-color: var(--color-violet);
  color: var(--color-violet-light);
}

.coord-display {
  position: absolute;
  bottom: 10px;
  right: 12px;
  font-size: 0.75rem;
  font-family: monospace;
  color: rgba(148, 163, 184, 0.6);
  pointer-events: none;
}

let _resolvers = [];
let _ready = false;

window.__katexReady = function () {
  _ready = true;
  _resolvers.forEach(fn => fn());
  _resolvers = [];
};

// If KaTeX already loaded before this module ran
if (window.__katexLoaded) {
  _ready = true;
}

function waitForKaTeX() {
  if (_ready) return Promise.resolve();
  return new Promise(resolve => _resolvers.push(resolve));
}

async function renderMath(container = document.body) {
  await waitForKaTeX();
  if (typeof renderMathInElement === 'function') {
    renderMathInElement(container, {
      delimiters: [
        { left: '$$', right: '$$', display: true },
        { left: '$', right: '$', display: false },
        { left: '\\(', right: '\\)', display: false },
        { left: '\\[', right: '\\]', display: true },
      ],
      throwOnError: false,
    });
  }
}

                    style="transition: stroke-dashoffset 0.6s ease"/>
          </svg>
          <span id="header-progress-text" aria-label="Lessons mastered">0/67</span>
        </div>
        <button class="mobile-menu-btn" id="mobile-menu-btn"
                aria-label="Toggle navigation menu" aria-expanded="false" aria-controls="header-nav">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  `;
}

// ── components/quiz.js ──────────────────────────────────────────────────
// components/quiz.js — Interactive Quiz Engine


/**
 * Render a quiz into a mount element.
 * @param {HTMLElement} mount - Container element
 * @param {Array} problems - Array of problem objects
 * @param {string} lessonId - Lesson ID for progress saving
 * @param {string} accent - CSS color for styling
 * @param {Function} onComplete - Called with (lessonId, score, total) on finish
 * @param {Function} onUpdate - Called after progress saved (e.g. refresh header)
 */
function renderQuiz(mount, problems, lessonId, accent, onComplete, onUpdate) {
  let current = 0;
  let score = 0;
  const results = []; // {answered: bool, correct: bool}

  function render() {
    if (current >= problems.length) {
      showScore();
      return;
    }
    const q = problems[current];
    const diffLabel = current < 2 ? 'Easy' : current < 4 ? 'Medium' : 'Hard';
    const diffColor = current < 2 ? 'var(--color-emerald)' : current < 4 ? 'var(--color-amber)' : 'var(--color-rose)';
    const diffBg    = current < 2 ? 'rgba(16,185,129,0.1)' : current < 4 ? 'rgba(245,158,11,0.1)' : 'rgba(244,63,94,0.1)';
    const diffBorder= current < 2 ? 'rgba(16,185,129,0.25)' : current < 4 ? 'rgba(245,158,11,0.25)' : 'rgba(244,63,94,0.25)';
    mount.innerHTML = `
      <div class="quiz-container">
        <div class="quiz-progress">
          <div class="quiz-progress-bar">
            <div class="quiz-progress-fill" style="width:${(current / problems.length) * 100}%"></div>
          </div>
          <div style="display:flex;align-items:center;gap:10px">
            <span class="quiz-progress-text">Question ${current + 1} of ${problems.length}</span>
            <span style="font-size:0.72rem;font-weight:600;padding:2px 8px;border-radius:10px;background:${diffBg};color:${diffColor};border:1px solid ${diffBorder}">${diffLabel}</span>
          </div>
        </div>
        <div class="quiz-question" role="group" aria-label="Question ${current + 1}">
          <div class="question-text">${q.question}</div>
          ${q.type === 'mc' ? renderMC(q) : renderFill(q)}
          <div class="quiz-feedback" id="feedback" role="alert" aria-live="polite"></div>
          <div class="quiz-actions">
            <button class="btn btn-primary" id="check-btn">Check Answer</button>
            <button class="btn btn-secondary" id="next-btn" style="display:none">
              ${current < problems.length - 1 ? 'Next Question →' : 'See Results'}
            </button>
          </div>
        </div>
      </div>
    `;

    renderMath(mount);

    document.getElementById('check-btn').addEventListener('click', checkAnswer);
    document.getElementById('next-btn').addEventListener('click', () => {
      current++;
      render();
    });

    if (q.type === 'fill') {
      const input = document.getElementById('fill-input');
      if (input) input.addEventListener('keydown', e => { if (e.key === 'Enter') checkAnswer(); });
    }
  }

  function renderMC(q) {
    const letters = ['A', 'B', 'C', 'D', 'E'];
    return `
      <div class="quiz-options" id="options">
        ${q.choices.map((c, i) => `
          <div class="quiz-option" data-idx="${i}" style="cursor:pointer">
            <span class="option-letter">${letters[i]}</span>
            <span>${c}</span>
          </div>
        `).join('')}
      </div>
      <input type="hidden" id="selected-option" value="">
    `;
  }

  function renderFill(q) {
    return `
      <div class="quiz-input-group">
        <input type="text" class="quiz-input" id="fill-input"
               placeholder="Type your answer here…" autocomplete="off">
      </div>
    `;
  }

  function setupMCListeners() {
    const options = mount.querySelectorAll('.quiz-option');
    options.forEach(opt => {
      opt.addEventListener('click', () => {
        if (mount.querySelector('#selected-option').value !== '') return; // already answered
        options.forEach(o => o.classList.remove('selected'));
        opt.classList.add('selected');
        mount.querySelector('#selected-option').value = opt.dataset.idx;
      });
    });
  }

  function checkAnswer() {
    const q = problems[current];
    const checkBtn = document.getElementById('check-btn');
    const nextBtn = document.getElementById('next-btn');
    const feedback = document.getElementById('feedback');
    let isCorrect = false;

    if (q.type === 'mc') {
      setupMCListeners(); // ensure listeners on re-render
      const selected = mount.querySelector('#selected-option')?.value;
      if (selected === '') {
        feedback.textContent = 'Please select an answer first.';
        feedback.className = 'quiz-feedback show incorrect';
        return;
      }
      isCorrect = parseInt(selected) === q.correct;
      const options = mount.querySelectorAll('.quiz-option');
      options.forEach((opt, i) => {
        if (i === q.correct) opt.classList.add('correct');
        else if (i === parseInt(selected) && !isCorrect) opt.classList.add('incorrect');
        opt.style.cursor = 'default';
        opt.style.pointerEvents = 'none';
      });
    } else {
      const input = document.getElementById('fill-input');
      const userAnswer = normalizeAnswer(input?.value || '');
      const correctAnswers = [q.answer, ...(q.altAnswers || [])].map(normalizeAnswer);
      isCorrect = correctAnswers.includes(userAnswer);
      if (input) {
        input.classList.add(isCorrect ? 'correct' : 'incorrect');
        input.disabled = true;
      }
    }

    if (isCorrect) score++;

    feedback.innerHTML = isCorrect
      ? `✓ Correct! ${q.explanation}`
      : `✗ Not quite. ${q.explanation}`;
    feedback.className = `quiz-feedback show ${isCorrect ? 'correct' : 'incorrect'}`;

    checkBtn.style.display = 'none';
    nextBtn.style.display = '';

    renderMath(feedback);
  }

  function normalizeAnswer(str) {
    return str.trim().toLowerCase()
      .replace(/\s+/g, '')
      .replace(/×/g, '*')
      .replace(/÷/g, '/')
      .replace(/[−–]/g, '-');
  }

  function showScore() {
    const pct = Math.round((score / problems.length) * 100);
    const mastered = pct >= 80;
    const emoji = pct === 100 ? '🏆' : pct >= 80 ? '⭐' : pct >= 60 ? '👍' : '📚';
    const message = pct === 100 ? 'Perfect score! Outstanding!' :
                    pct >= 80 ? 'Great job! Lesson mastered!' :
                    pct >= 60 ? 'Good effort! Review and try again.' :
                    'Keep practicing — you\'ve got this!';

    mount.innerHTML = `
      <div class="quiz-score concept-card">
        <div style="font-size:3.5rem;margin-bottom:16px">${emoji}</div>
        <h2>${pct}% — ${mastered ? 'Mastered!' : 'Keep Going!'}</h2>
        <p>${message}</p>
        <p style="font-size:0.9rem;margin-top:4px;color:var(--color-text-muted)">${score} out of ${problems.length} correct</p>
        <div style="margin-top:24px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
          <button class="btn btn-secondary" id="retry-btn">Try Again</button>
          ${mastered ? `<div style="padding:10px 20px;background:rgba(16,185,129,0.12);border:1px solid rgba(16,185,129,0.3);border-radius:8px;color:var(--color-emerald);font-weight:600;font-size:0.9rem">✓ Lesson Mastered!</div>` : ''}
        </div>
      </div>
    `;

    onComplete(lessonId, score, problems.length);
    if (onUpdate) onUpdate();

    document.getElementById('retry-btn').addEventListener('click', () => {
      current = 0;
      score = 0;
      render();
    });
  }

  // Attach MC listeners after initial render using event delegation
  mount.addEventListener('click', e => {
    const opt = e.target.closest('.quiz-option');
    if (!opt) return;
    const selected = mount.querySelector('#selected-option');
    if (!selected || selected.value !== '') return;
    mount.querySelectorAll('.quiz-option').forEach(o => o.classList.remove('selected'));
    opt.classList.add('selected');
    selected.value = opt.dataset.idx;
  });

  render();
}

// ── components/grapher.js ───────────────────────────────────────────────
// components/grapher.js — Canvas-based interactive function plotter

const COLORS = ['#7c3aed', '#3b82f6', '#10b981', '#f97316', '#f43f5e', '#06b6d4', '#ec4899'];

/**
 * Safely evaluate a math expression at x.
 * Supports: +, -, *, /, ^, sin, cos, tan, sqrt, abs, log, ln, exp, pi, e
 */
function evalAt(expr, x) {
  const code = expr.trim()
    .replace(/\^/g,              '**')
    .replace(/(\d)(x)/g,         '$1*$2')
    .replace(/(x)(\d)/g,         '$1*$2')
    .replace(/(\d)\(/g,           '$1*(')
    .replace(/\bsin\b/g,          'Math.sin')
    .replace(/\bcos\b/g,          'Math.cos')
    .replace(/\btan\b/g,          'Math.tan')
    .replace(/\bsqrt\b/g,         'Math.sqrt')
    .replace(/\babs\b/g,          'Math.abs')
    .replace(/\bln\b/g,           'Math.log')
    .replace(/\blog\b/g,          'Math.log10')
    .replace(/\bexp\b/g,          'Math.exp')
    .replace(/\bpi\b/gi,          'Math.PI')
    .replace(/(?<![a-zA-Z])e(?![a-zA-Z])/g, 'Math.E');
  try {
    // eslint-disable-next-line no-new-func
    const y = new Function('x', '"use strict"; return (' + code + ');')(x);
    return typeof y === 'number' && isFinite(y) ? y : NaN;
  } catch {
    return NaN;
  }
}

function niceStep(rawRange, targetDivisions) {
  const raw  = rawRange / targetDivisions;
  const pow  = Math.pow(10, Math.floor(Math.log10(raw)));
  const norm = raw / pow;
  if (norm < 1.5) return pow;
  if (norm < 3.5) return 2 * pow;
  if (norm < 7.5) return 5 * pow;
  return 10 * pow;
}

function fmt(n) {
  if (n === 0) return '0';
  const abs = Math.abs(n);
  if (abs >= 100) return n.toFixed(0);
  if (abs >= 10)  return parseFloat(n.toPrecision(3)).toString();
  if (abs >= 1)   return parseFloat(n.toPrecision(3)).toString();
  return parseFloat(n.toPrecision(2)).toString();
}

function renderGrapher(container) {
  let colorCursor = 0;
  function nextColor() { return COLORS[colorCursor++ % COLORS.length]; }

  container.innerHTML = `
    <div class="grapher-wrap">
      <div class="grapher-sidebar">
        <p class="grapher-title">Functions</p>
        <div class="grapher-fn-list" id="grapher-fn-list"></div>
        <button class="btn btn-secondary btn-sm" id="add-fn-btn">+ Add Function</button>
        <div class="grapher-presets">
          <p class="grapher-presets-label">Quick examples:</p>
          ${['x^2', 'x^3 - x', 'sin(x)', 'cos(x)', 'sqrt(x)', '2^x', 'log(x)', '1/x', 'abs(x)', 'x^2 - 4'].map(fn =>
            `<button class="grapher-preset-btn" data-fn="${fn}">${fn}</button>`
          ).join('')}
        </div>
      </div>
      <div class="grapher-canvas-area">
        <canvas id="graph-canvas"></canvas>
        <div class="grapher-zoom-controls">
          <button class="grapher-ctrl-btn" id="zoom-in-btn"  title="Zoom in">+</button>
          <button class="grapher-ctrl-btn" id="zoom-out-btn" title="Zoom out">−</button>
          <button class="grapher-ctrl-btn" id="reset-btn"    title="Reset view">⊙</button>
        </div>
        <div id="coord-display" class="coord-display" aria-live="off"></div>
      </div>
    </div>
  `;

  const canvas  = document.getElementById('graph-canvas');
  const ctx     = canvas.getContext('2d');
  const fnList  = document.getElementById('grapher-fn-list');

  // ---- State ----
  let view = { xMin: -10, xMax: 10, yMin: -8, yMax: 8 };
  let fns  = [];   // { id, expr, color, error }
  let drag = null; // { startX, startY, viewAtStart }
  let pinch = null;

  // ---- Function management ----
  function addFn(expr) {
    fns.push({ id: Date.now() + Math.random(), expr: expr || '', color: nextColor(), error: false });
    rebuildFnList();
    draw();
  }

  function removeFn(id) {
    fns = fns.filter(f => f.id !== id);
    rebuildFnList();
    draw();
  }

  function setFnExpr(id, expr) {
    const f = fns.find(f => f.id === id);
    if (f) { f.expr = expr; f.error = false; }
    draw();
    updateErrorFlags();
  }

  function updateErrorFlags() {
    fnList.querySelectorAll('.grapher-fn-row').forEach(row => {
      const id  = Number(row.dataset.id);
      const f   = fns.find(f => f.id === id);
      const err = row.querySelector('.grapher-fn-error');
      if (err && f) err.style.display = f.error ? 'inline' : 'none';
    });
  }

  function rebuildFnList() {
    fnList.innerHTML = fns.map(f => `
      <div class="grapher-fn-row" data-id="${f.id}">
        <span class="grapher-fn-swatch" style="background:${f.color}" aria-hidden="true"></span>
        <span class="grapher-fn-prefix">y =</span>
        <input class="grapher-fn-input" type="text" value="${escHtml(f.expr)}"
               placeholder="e.g. x^2" spellcheck="false" autocomplete="off"
               aria-label="Function expression">
        <button class="grapher-fn-remove" aria-label="Remove this function">×</button>
        <span class="grapher-fn-error" style="display:none">invalid</span>
      </div>
    `).join('');

    fnList.querySelectorAll('.grapher-fn-input').forEach(input => {
      const id = Number(input.closest('.grapher-fn-row').dataset.id);
      input.addEventListener('input', () => setFnExpr(id, input.value));
    });
    fnList.querySelectorAll('.grapher-fn-remove').forEach(btn => {
      const id = Number(btn.closest('.grapher-fn-row').dataset.id);
      btn.addEventListener('click', () => removeFn(id));
    });
  }

  function escHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
  }

  // ---- Resize ----
  function resize() {
    const area   = canvas.parentElement;
    canvas.width  = area.clientWidth;
    canvas.height = area.clientHeight;
    draw();
  }

  const ro = new ResizeObserver(resize);
  ro.observe(canvas.parentElement);

  // ---- Coordinate transforms ----
  function toCanvas(wx, wy) {
    return {
      cx: (wx - view.xMin) / (view.xMax - view.xMin) * canvas.width,
      cy: (1 - (wy - view.yMin) / (view.yMax - view.yMin)) * canvas.height,
    };
  }

  function toWorld(cx, cy) {
    return {
      wx: view.xMin + (cx / canvas.width)  * (view.xMax - view.xMin),
      wy: view.yMin + (1 - cy / canvas.height) * (view.yMax - view.yMin),
    };
  }

  // ---- Drawing ----
  function draw() {
    if (!canvas.width || !canvas.height) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawGrid();
    drawAxes();
    fns.forEach(f => { if (f.expr.trim()) drawFn(f); });
  }

  function drawGrid() {
    const xStep = niceStep(view.xMax - view.xMin, 10);
    const yStep = niceStep(view.yMax - view.yMin, 8);
    ctx.strokeStyle = 'rgba(148,163,184,0.09)';
    ctx.lineWidth   = 1;

    const xStart = Math.ceil(view.xMin / xStep) * xStep;
    for (let wx = xStart; wx <= view.xMax + xStep * 0.01; wx += xStep) {
      const { cx } = toCanvas(wx, 0);
      ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, canvas.height); ctx.stroke();
    }
    const yStart = Math.ceil(view.yMin / yStep) * yStep;
    for (let wy = yStart; wy <= view.yMax + yStep * 0.01; wy += yStep) {
      const { cy } = toCanvas(0, wy);
      ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(canvas.width, cy); ctx.stroke();
    }

    // Axis number labels
    ctx.fillStyle = 'rgba(148,163,184,0.55)';
    ctx.font      = '11px system-ui,sans-serif';
    const origin  = toCanvas(0, 0);
    const axisLabelY = Math.min(Math.max(origin.cy + 15, 14), canvas.height - 4);
    const axisLabelX = Math.min(Math.max(origin.cx - 6,  4), canvas.width  - 4);

    ctx.textAlign = 'center';
    for (let wx = xStart; wx <= view.xMax + xStep * 0.01; wx += xStep) {
      if (Math.abs(wx) < xStep * 0.01) continue;
      const { cx } = toCanvas(wx, 0);
      if (cx < 4 || cx > canvas.width - 4) continue;
      ctx.fillText(fmt(wx), cx, axisLabelY);
    }

    ctx.textAlign = 'right';
    for (let wy = yStart; wy <= view.yMax + yStep * 0.01; wy += yStep) {
      if (Math.abs(wy) < yStep * 0.01) continue;
      const { cy } = toCanvas(0, wy);
      if (cy < 10 || cy > canvas.height - 4) continue;
      ctx.fillText(fmt(wy), axisLabelX, cy + 4);
    }
  }

  function drawAxes() {
    ctx.strokeStyle = 'rgba(148,163,184,0.45)';
    ctx.lineWidth   = 1.5;
    const { cx: ox, cy: oy } = toCanvas(0, 0);

    if (view.yMin <= 0 && view.yMax >= 0) {
      ctx.beginPath(); ctx.moveTo(0, oy); ctx.lineTo(canvas.width, oy); ctx.stroke();
    }
    if (view.xMin <= 0 && view.xMax >= 0) {
      ctx.beginPath(); ctx.moveTo(ox, 0); ctx.lineTo(ox, canvas.height); ctx.stroke();
    }

    // Axis labels
    ctx.fillStyle   = 'rgba(148,163,184,0.6)';
    ctx.font        = 'italic 13px system-ui,sans-serif';
    const xLabelCx  = Math.min(Math.max(ox, 4), canvas.width - 16);
    const yLabelCy  = Math.min(Math.max(oy, 4), canvas.height - 16);
    ctx.textAlign   = 'left';
    ctx.fillText('x', canvas.width - 12, yLabelCy + 4);
    ctx.textAlign   = 'center';
    ctx.fillText('y', xLabelCx, 14);
  }

  function drawFn(f) {
    const steps = Math.min(canvas.width * 2, 2000);
    const dx    = (view.xMax - view.xMin) / steps;
    const range = view.yMax - view.yMin;

    ctx.strokeStyle = f.color;
    ctx.lineWidth   = 2.5;
    ctx.lineJoin    = 'round';
    ctx.lineCap     = 'round';
    ctx.beginPath();

    let penDown = false;
    let prevY   = NaN;
    let anyValid = false;

    for (let i = 0; i <= steps; i++) {
      const wx  = view.xMin + i * dx;
      const wy  = evalAt(f.expr, wx);
      const { cx, cy } = toCanvas(wx, wy);

      if (isNaN(wy)) {
        penDown = false; prevY = NaN;
        continue;
      }

      anyValid = true;

      // Discontinuity: large vertical jump → lift pen
      if (penDown && !isNaN(prevY) && Math.abs(wy - prevY) > range * 4) {
        penDown = false;
      }

      if (!penDown) { ctx.moveTo(cx, cy); penDown = true; }
      else          { ctx.lineTo(cx, cy); }

      prevY = wy;
    }
    ctx.stroke();

    f.error = !anyValid && f.expr.trim().length > 0;
    updateErrorFlags();
  }

  // ---- Pan & Zoom ----
  canvas.addEventListener('mousedown', e => {
    drag = { startX: e.clientX, startY: e.clientY, viewAtStart: { ...view } };
    canvas.style.cursor = 'grabbing';
  });

  window.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    if (drag) {
      const dx = e.clientX - drag.startX;
      const dy = e.clientY - drag.startY;
      const { xMin, xMax, yMin, yMax } = drag.viewAtStart;
      const wdx = -dx / canvas.width  * (xMax - xMin);
      const wdy =  dy / canvas.height * (yMax - yMin);
      view = { xMin: xMin + wdx, xMax: xMax + wdx, yMin: yMin + wdy, yMax: yMax + wdy };
      draw();
    }

    if (mx >= 0 && mx <= canvas.width && my >= 0 && my <= canvas.height) {
      const { wx, wy } = toWorld(mx, my);
      const el = document.getElementById('coord-display');
      if (el) el.textContent = `(${fmt(wx)}, ${fmt(wy)})`;
    }
  });

  window.addEventListener('mouseup', () => {
    drag = null;
    canvas.style.cursor = 'crosshair';
  });

  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const { wx, wy } = toWorld(e.clientX - rect.left, e.clientY - rect.top);
    const factor = e.deltaY > 0 ? 1.15 : 1 / 1.15;
    view = {
      xMin: wx + (view.xMin - wx) * factor,
      xMax: wx + (view.xMax - wx) * factor,
      yMin: wy + (view.yMin - wy) * factor,
      yMax: wy + (view.yMax - wy) * factor,
    };
    draw();
  }, { passive: false });

  // Touch: pan & pinch-zoom
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    if (e.touches.length === 1) {
      drag = { startX: e.touches[0].clientX, startY: e.touches[0].clientY, viewAtStart: { ...view } };
      pinch = null;
    } else if (e.touches.length === 2) {
      const rect = canvas.getBoundingClientRect();
      const mx = (e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left;
      const my = (e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top;
      pinch = {
        d0: Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY),
        pivot: toWorld(mx, my),
        viewAtStart: { ...view },
      };
      drag = null;
    }
  }, { passive: false });

  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (drag && e.touches.length === 1) {
      const dx = e.touches[0].clientX - drag.startX;
      const dy = e.touches[0].clientY - drag.startY;
      const { xMin, xMax, yMin, yMax } = drag.viewAtStart;
      view = {
        xMin: xMin - dx / canvas.width  * (xMax - xMin),
        xMax: xMax - dx / canvas.width  * (xMax - xMin),
        yMin: yMin + dy / canvas.height * (yMax - yMin),
        yMax: yMax + dy / canvas.height * (yMax - yMin),
      };
      draw();
    } else if (pinch && e.touches.length === 2) {
      const d      = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      const factor = pinch.d0 / d;
      const { wx, wy } = pinch.pivot;
      const { xMin, xMax, yMin, yMax } = pinch.viewAtStart;
      view = {
        xMin: wx + (xMin - wx) * factor, xMax: wx + (xMax - wx) * factor,
        yMin: wy + (yMin - wy) * factor, yMax: wy + (yMax - wy) * factor,
      };
      draw();
    }
  }, { passive: false });

  canvas.addEventListener('touchend', () => { drag = null; pinch = null; });

  function zoomAround(factor) {
    const cx = (view.xMin + view.xMax) / 2;
    const cy = (view.yMin + view.yMax) / 2;
    view = {

      <div class="formula-box">$$\\lim_{x \\to a^+} f(x) = L$$</div>
      <p>This reads as "the limit of f(x) as x approaches a from the right equals L." We only consider values where $x > a$.</p>

      <h3>Left-Hand Limit (from the left)</h3>
      <div class="formula-box">$$\\lim_{x \\to a^-} f(x) = L$$</div>
      <p>This reads as "the limit of f(x) as x approaches a from the left equals L." We only consider values where $x < a$.</p>

      <h2>When Does the Overall Limit Exist?</h2>
      <p>The two-sided limit $\\lim_{x \\to a} f(x)$ exists if and only if:</p>
      <div class="formula-box">$$\\lim_{x \\to a^-} f(x) = \\lim_{x \\to a^+} f(x)$$</div>

      <h2>Definition of Continuity</h2>
      <p>A function f is <strong>continuous at x = a</strong> if three conditions are satisfied:</p>
      <ol>
        <li><strong>f(a) is defined:</strong> The function has a value at x = a</li>
        <li><strong>The limit exists:</strong> $\\lim_{x \\to a} f(x)$ exists</li>
        <li><strong>Limit equals function value:</strong> $\\lim_{x \\to a} f(x) = f(a)$</li>
      </ol>
      <p>If any of these three conditions fail, the function is <strong>discontinuous</strong> at x = a.</p>

      <h2>Types of Discontinuities</h2>

      <h3>Removable Discontinuity (Hole)</h3>
      <p>The limit exists, but either f(a) is undefined or $f(a) \\neq \\lim_{x \\to a} f(x)$. It\'s called "removable" because you could "fix" the function by redefining f(a).</p>
      <p><strong>Example:</strong> $f(x) = \\frac{x^2 - 1}{x - 1}$ at $x = 1$. The limit is 2, but f(1) is undefined.</p>

      <h3>Jump Discontinuity</h3>
      <p>The left and right limits exist but are different. The function "jumps" at that point.</p>
      <p><strong>Example:</strong> A piecewise function with different outputs on each side.</p>

      <h3>Infinite Discontinuity (Vertical Asymptote)</h3>
      <p>The function increases or decreases without bound as x approaches a. The limit does not exist (or is ±∞).</p>
      <p><strong>Example:</strong> $f(x) = \\frac{1}{x}$ at $x = 0$.</p>

      <h2>Continuity of Basic Functions</h2>
      <ul>
        <li><strong>Polynomials:</strong> Continuous everywhere</li>
        <li><strong>Rational functions:</strong> Continuous on their domains (all points except where denominator = 0)</li>
        <li><strong>Trigonometric functions:</strong> Continuous on their domains</li>
        <li><strong>Root functions:</strong> Continuous on their domains (e.g., $\\sqrt{x}$ continuous for $x \\geq 0$)</li>
      </ul>

      <h2>The Extreme Value Theorem (EVT)</h2>
      <p><strong>If f is continuous on a closed interval [a, b], then f attains its maximum and minimum values on that interval.</strong></p>
      <p>In other words, there exist points c and d in [a, b] such that $f(c) \\leq f(x) \\leq f(d)$ for all x in [a, b].</p>
      <p>Note: The interval must be closed and the function must be continuous for EVT to apply.</p>

    id: '1.6',
    title: 'Intermediate Value Theorem',
    learn: `
      <h2>The Intermediate Value Theorem (IVT)</h2>
      <p><strong>Statement:</strong> If f is continuous on the closed interval [a, b], and N is any number between f(a) and f(b), then there exists at least one number c in the open interval (a, b) such that $f(c) = N$.</p>

      <h3>In Simpler Terms:</h3>
      <p>If a continuous function goes from one y-value to another, it must pass through every y-value in between. There are no "jumps" in the output.</p>

      <h2>Key Conditions for IVT</h2>
      <ol>
        <li><strong>f must be continuous on [a, b]</strong> — No breaks, jumps, or holes</li>
        <li><strong>N is between f(a) and f(b)</strong> — So either $f(a) < N < f(b)$ or $f(b) < N < f(a)$</li>
      </ol>

      <h2>The Root-Finding Application</h2>
      <p>A common use of IVT is to prove that an equation has a solution:</p>
      <p><strong>If f is continuous on [a, b] and f(a) and f(b) have opposite signs (one positive, one negative), then f(c) = 0 for some c in (a, b).</strong></p>
      <p>This is called a <strong>sign change</strong> argument.</p>

      <h3>Example:</h3>
      <p>Does $x^3 - 2x - 5 = 0$ have a solution in [2, 3]?</p>
      <ul>
        <li>Let $f(x) = x^3 - 2x - 5$</li>
        <li>f is a polynomial, so it is continuous everywhere</li>
        <li>$f(2) = 8 - 4 - 5 = -1 < 0$</li>
        <li>$f(3) = 27 - 6 - 5 = 16 > 0$</li>
        <li>Since f(2) < 0 < f(3), by IVT there exists c in (2, 3) where $f(c) = 0$</li>
      </ul>
      <p>So the equation definitely has a solution in [2, 3]!</p>

      <h2>What IVT Does NOT Tell Us</h2>
      <ul>
        <li>IVT does not give us the exact value of c, only that it exists</li>
        <li>IVT does not tell us how many solutions exist, only that at least one does</li>
        <li>IVT requires continuity — it fails for discontinuous functions</li>
      </ul>
    `,

      <h2>The Squeeze Theorem</h2>
      <p><strong>Statement:</strong> If $g(x) \\leq f(x) \\leq h(x)$ for all x in some interval around a (except possibly at a itself), and $\\lim_{x \\to a} g(x) = \\lim_{x \\to a} h(x) = L$, then $\\lim_{x \\to a} f(x) = L$.</p>

      <h3>Intuition:</h3>
      <p>Think of f(x) as being "squeezed" between two functions g(x) and h(x). If both boundary functions approach the same limit L, then f(x) must also approach L, no matter how it oscillates between them.</p>

      <h2>Proving Special Trig Limits</h2>

      <h3>Classic Result: $\\lim_{x \\to 0} \\frac{\\sin x}{x} = 1$</h3>
      <p><strong>Geometric proof outline:</strong> Consider a unit circle and compare:</p>

        <li>The area of the outer triangle: $\\frac{1}{2}\\tan x$</li>
      </ul>
      <p>This gives us: $\\sin x < x < \\tan x$ (for small positive x).</p>
      <p>Dividing by x: $\\frac{\\sin x}{x} < 1 < \\frac{\\tan x}{x}$</p>
      <p>Rearranging: $\\frac{\\sin x}{x} < 1 < \\frac{1}{\\cos x} \\cdot \\frac{\\sin x}{x}$</p>
      <p>As x → 0: $\\cos x \\to 1$, so $\\frac{\\sin x}{x}$ is squeezed between something approaching 1 and 1 itself. Thus $\\lim_{x \\to 0} \\frac{\\sin x}{x} = 1$.</p>

<h2>The Chain Rule</h2>
<p>The <strong>chain rule</strong> is the fundamental technique for differentiating composite functions—functions built by composing two or more functions together.</p>

<div class="formula-box">
<h3>Chain Rule</h3>
<p>If $y = f(g(x))$, then:</p>
$$\\frac{dy}{dx} = f'(g(x)) \\cdot g'(x)$$
<p><strong>In words:</strong> The derivative of the outer function evaluated at the inner function, times the derivative of the inner function.</p>

<p><strong>Alternative notation:</strong> If $y = f(u)$ where $u = g(x)$, then:</p>
$$\\frac{dy}{dx} = \\frac{dy}{du} \\cdot \\frac{du}{dx}$$

<div class="tip-box">
<div class="tip-icon">💡</div>
<h3>Extended Chain Rule</h3>
<p>For three or more layers, $y = f(g(h(x)))$:</p>
$$\\frac{dy}{dx} = f'(g(h(x))) \\cdot g'(h(x)) \\cdot h'(x)$$
<p>The pattern: differentiate from outside to inside, multiplying each derivative by the next layer's derivative.</p>
</div>

<h3>Common Pattern</h3>
<p>When you see a power, exponential, logarithm, or trig function applied to a function $u(x)$:</p>

<h2>Derivatives of Inverse Functions</h2>
<p>If two functions are inverses of each other, there\'s a beautiful relationship between their derivatives. If $f$ and $g$ are inverse functions, then the derivative of $g$ at a point is the reciprocal of the derivative of $f$ at the corresponding point.</p>

<div class="formula-box">
<h3>Inverse Function Derivative Theorem</h3>
<p>If $f$ and $g$ are inverse functions and $f\'(g(a)) \\neq 0$, then:</p>
$$g\'(a) = \\frac{1}{f\'(g(a))}$$
<p>Equivalently, if $f(b) = a$, then $g\'(a) = \\frac{1}{f\'(b)}$.</p>
</div>

<h3>Geometric Insight</h3>
<p>The graphs of $f$ and $g$ are reflections of each other across the line $y = x$. When you reflect a line with slope $m$ across $y = x$, you get a line with slope $\\frac{1}{m}$. This is why the derivatives are reciprocals.</p>

<div class="tip-box">
<div class="tip-icon">💡</div>
<h3>Common Notation</h3>
<p>The derivative of the inverse function $f^{-1}$ at point $a$ is often written:</p>

<p>The derivative $f\'(x)$ is itself a function that can be differentiated. Its derivative is called the <strong>second derivative</strong> $f\'\'(x)$. We can continue this process to get third, fourth, and higher-order derivatives.</p>

<p><strong>$n$-th derivative:</strong> $f^{(n)}(x)$, $\\frac{d^ny}{dx^n}$</p>

<h3>Physical Interpretation</h3>
<p>If $f(t)$ represents position:</p>
<ul>

<p>The second derivative tells us about the concavity of the original function:</p>
<ul>

<li>If $f\'\'(x) < 0$, the function is <strong>concave down</strong> (curves downward).</li>
<li>If $f\'\'(x) = 0$, we may have an inflection point.</li>
</ul>
</div>

<div style="">
  <div class="concept-card">
    <h3>Linearization and Linear Approximation</h3>
    <p>The <strong>linear approximation</strong> (or <strong>linearization</strong>) of a function $$f$$ at a point $$x = a$$ is the equation of the tangent line at that point:</p>
    <p>$$L(x) = f(a) + f'(a)(x - a)$$</p>
    <p>For $$x$$ close to $$a$$, we use $$L(x)$$ as an approximation: $$f(x) \approx L(x)$$</p>
    <p><strong>Why it works:</strong> Near the point of tangency, the tangent line closely follows the curve. The closer $$x$$ is to $$a$$, the better the approximation.</p>
  </div>

  <div class="concept-card">
    <h3>Differential and Error</h3>
    <p>The <strong>differential</strong> $$dy$$ represents the change in the linear approximation:</p>
    <p>$$dy = f'(x) \, dx$$</p>
    <p>This is useful for estimating errors. If $$x$$ changes by a small amount $$dx$$, the actual change in $$f$$ is approximately $$dy$$.</p>
    <p><strong>Concavity and approximation accuracy:</strong></p>
    <ul>
      <li>If $$f$ is <strong>concave up</strong> ($$f'' > 0$$): the tangent line <strong>underestimates</strong> $$f$$</li>
      <li>If $$f$ is <strong>concave down</strong> ($$f'' < 0$$): the tangent line <strong>overestimates</strong> $$f$$</li>
    </ul>
  </div>

  <div class="formula-box">
    <h4>Key Formulas</h4>
    <p>$$L(x) = f(a) + f'(a)(x - a)$$</p>
    <p>$$f(x) \approx f(a) + f'(a)(x - a)$$</p>
    <p>$$dy = f'(x) \, dx$$</p>
    <p>$$\Delta y \approx dy$$ for small $$\Delta x$$</p>

    <p>Choose a value $$a$$ where $$f(a)$$ and $$f'(a)$$ are easy to compute. The tangent line provides a good approximation only for values of $$x$$ very close to $$a$$.</p></p>
 </div>
</div>

<div style="">
  <div class="concept-card">
    <h3>L'Hôpital's Rule</h3>
    <p>When evaluating $$\lim_{x \to a} \frac{f(x)}{g(x)}$$ results in the indeterminate form $$\frac{0}{0}$$ or $$\frac{\infty}{\infty}$$, we can use:</p>
    <p>$$\lim_{x \to a} \frac{f(x)}{g(x)} = \lim_{x \to a} \frac{f'(x)}{g'(x)}$$</p>
    <p><strong>provided</strong> the limit on the right exists (or is ±∞).</p>
    <p><strong>Important:</strong> You are differentiating the numerator and denominator <strong>separately</strong>, not using the quotient rule.</p>
  </div>

  <div class="concept-card">
    <h3>Other Indeterminate Forms</h3>
    <p>L'Hôpital's Rule applies directly to $$\frac{0}{0}$$ and $$\frac{\infty}{\infty}$$. Other indeterminate forms must be rewritten:</p>
    <ul>
      <li><strong>$$0 \cdot \infty$$:</strong> Rewrite as $$\frac{f(x)}{1/g(x)}$$ to get $$\frac{0}{0}$$ or $$\frac{\infty}{\infty}$$</li>
      <li><strong>$$\infty - \infty$$:</strong> Combine fractions or factor to create a single fraction</li>
      <li><strong>$$0^0$$, $$1^\infty$$, $$\infty^0$$:</strong> Use logarithms. If $$L = \lim f(x)^{g(x)}$$, then $$\ln L = \lim g(x) \ln f(x)$$</li>
    </ul>
  </div>

  <div class="formula-box">
    <h4>L'Hôpital's Rule</h4>
    <p>If $$\lim_{x \to a} f(x) = 0$$ and $$\lim_{x \to a} g(x) = 0$$ (or both are ±∞), then:</p>
    <p>$$\lim_{x \to a} \frac{f(x)}{g(x)} = \lim_{x \to a} \frac{f'(x)}{g'(x)}$$</p>
    <p>Rule may be applied <strong>repeatedly</strong> if needed.</p>

 </div>

  <div class="concept-card">
    <h3>The Mean Value Theorem (MVT)</h3>
    <p><strong>Theorem:</strong> If $$f$$ is continuous on $$[a, b]$$ and differentiable on $$(a, b)$$, then there exists at least one point $$c$$ in $$(a, b)$$ such that:</p>
    <p>$$f'(c) = \\frac{f(b) - f(a)}{b - a}$$</p>
    <p><strong>Geometric interpretation:</strong> The slope of the tangent line at some point $$c$$ equals the slope of the secant line connecting the endpoints.</p>
    <p><strong>Why it matters:</strong> MVT guarantees the existence of such a point—it doesn't tell us where, but it's powerful for proving inequalities and understanding function behavior.</p>
  </div>

  <div class="concept-card">
    <h3>Rolle's Theorem</h3>
    <p><strong>Special case of MVT:</strong> If $$f$$ is continuous on $$[a, b]$$, differentiable on $$(a, b)$$, and $$f(a) = f(b)$$, then there exists at least one $$c$$ in $$(a, b)$$ such that:</p>
    <p>$$f'(c) = 0$$</p>
    <p><strong>Interpretation:</strong> Between two points with equal height, there must be a local extremum (peak or valley) where the tangent is horizontal.</p>
  </div>

  <div class="concept-card">
    <h3>Important Consequences</h3>
    <ul>
      <li><strong>Constant functions:</strong> If $$f'(x) = 0$$ for all $$x$$ in an interval, then $$f(x)$$ is constant on that interval.</li>
      <li><strong>Identical derivatives:</strong> If $$f'(x) = g'(x)$$ for all $$x$$ in an interval, then $$f(x) = g(x) + C$$ for some constant $$C$$.</li>
      <li><strong>Monotonicity:</strong> If $$f'(x) > 0$$ on an interval, $$f$$ is strictly increasing; if $$f'(x) < 0$$, $$f$$ is strictly decreasing.</li>

      <div class="concept-card">
        <h2>The Fundamental Theorem of Calculus (Part 1)</h2>
        <p>Let $f$ be continuous on $[a, b]$. If $F$ is defined by:</p>
        <p>$$F(x) = \\int_a^x f(t)\\,dt$$</p>
        <p>then $F$ is differentiable on $(a, b)$ and:</p>
        <p>$$F'(x) = f(x)$$</p>
        <p>In other words, $F$ is an antiderivative of $f$. Taking the derivative of an accumulated area gives the height of the function.</p>
      </div>

      <div class="formula-box">
        <h3>Chain Rule Version</h3>
        <p>If $g(x)$ is differentiable:</p>
        <p>$$\\frac{d}{dx}\\left[\\int_a^{g(x)} f(t)\\,dt\\right] = f(g(x)) \\cdot g'(x)$$</p>
      </div>

      <div class="concept-card">
        <h2>Interpretation</h2>
        <p>The rate of change of accumulated area equals the height of the function at that point. If $F(x)$ represents total accumulated change, then $F'(x)$ is the instantaneous rate of change.</p>
      </div>

      <div class="tip-box">
        <div class="tip-icon">💡</div>
        <p><strong>Tip:</strong> When differentiating under the integral sign, remember the chain rule: the derivative is the integrand evaluated at the upper limit, times the derivative of the upper limit.</p>
      </div>

      <div class="concept-card">
        <h2>The Fundamental Theorem of Calculus (Part 2)</h2>
        <p>Let $f$ be continuous on $[a, b]$, and let $F$ be any antiderivative of $f$ on $[a, b]$. Then:</p>
        <p>$$\\int_a^b f(x)\\,dx = F(b) - F(a)$$</p>
        <p>This theorem connects the two main concepts of calculus: differentiation and integration. It shows that if you can find an antiderivative, you can evaluate the definite integral.</p>
      </div>

      <div class="formula-box">
        <h3>Evaluation Notation</h3>
        <p>$$\\int_a^b f(x)\\,dx = [F(x)]_a^b = F(b) - F(a)$$</p>
        <p>We often write the antiderivative in square brackets with the limits shown.</p>
      </div>

      <div class="concept-card">
        <h2>Net Change Theorem</h2>
        <p>If $F\'(x) = f(x)$, then:</p>
        <p>$$\\int_a^b F\'(x)\\,dx = F(b) - F(a)$$</p>
        <p>The definite integral of a rate of change equals the total change in the quantity. This is a powerful principle: distance traveled = integral of velocity, total growth = integral of growth rate, etc.</p>
      </div>

    unit: 6,
    level: 'AB',
    learn: `
      <div class="concept-card">
        <h2>u-Substitution: The Reverse Chain Rule</h2>
        <p>u-substitution is a technique for evaluating integrals that contain a composite function. It reverses the chain rule of differentiation.</p>
        <p>If an integral has the form $\\int f(g(x)) \\cdot g\'(x)\\,dx$, we can simplify by setting $u = g(x)$ and $du = g\'(x)\\,dx$.</p>
      </div>

      <div class="formula-box">
        <h3>u-Substitution for Indefinite Integrals</h3>
        <p>$$\\int f(g(x)) \\cdot g\'(x)\\,dx = \\int f(u)\\,du = F(u) + C = F(g(x)) + C$$</p>
        <p>where $u = g(x)$ and $du = g\'(x)\\,dx$</p>
      </div>

      <div class="formula-box">
        <h3>u-Substitution for Definite Integrals</h3>
        <p>$$\\int_a^b f(g(x)) \\cdot g\'(x)\\,dx = \\int_{g(a)}^{g(b)} f(u)\\,du$$</p>
        <p>When using u-substitution in a definite integral, <strong>change the limits of integration</strong> to the corresponding $u$ values.</p>
      </div>

      <div class="concept-card">
        <h2>Strategy for u-Substitution</h2>
        <ol>
          <li><strong>Identify the inner function.</strong> Look for a composite function $f(g(x))$ inside the integral.</li>
          <li><strong>Let $u$ equal the inner function.</strong> Set $u = g(x)$.</li>
          <li><strong>Find $du$.</strong> Compute $du = g\'(x)\\,dx$, so $dx = \\frac{du}{g\'(x)}$.</li>
          <li><strong>Rewrite the integral in terms of $u$.</strong> Substitute all instances of $g(x)$ with $u$ and $dx$ with the appropriate $du$ expression.</li>
          <li><strong>Integrate with respect to $u$.</strong></li>
          <li><strong>Back-substitute.</strong> Replace $u$ with $g(x)$ in the final answer (for indefinite integrals only).</li>
        </ol>
      </div>

      <div class="tip-box">
        <div class="tip-icon">💡</div>
        <p><strong>Tip:</strong> Choose $u$ to be the part whose derivative also appears (or is a constant multiple of what appears) in the integrand. This makes the integral simpler.</p>
      </div>
    `,

      <div class="concept-card">
        <h2>Integration by Parts</h2>
        <p>Integration by parts is a technique for integrating products of functions. It is derived from the product rule for differentiation.</p>
        <p>If $u$ and $v$ are differentiable functions, then:</p>
        <p>$$\\int u\\,dv = uv - \\int v\\,du$$</p>
        <p>This formula transfers the differentiation from one function to another, often simplifying the integral.</p>
      </div>

      <div class="formula-box">
        <h3>Integration by Parts Formula</h3>
        <p>$$\\int u\\,dv = uv - \\int v\\,du$$</p>
        <p>For definite integrals:</p>
        <p>$$\\int_a^b u\\,dv = [uv]_a^b - \\int_a^b v\\,du$$</p>
      </div>

      <div class="concept-card">
        <h2>LIATE Rule for Choosing $u$</h2>
        <p>When you have a product of two functions, choose $u$ according to this priority (LIATE):</p>
        <ol>
          <li><strong>L</strong>ogarithmic functions: $\\ln(x)$, $\\log(x)$</li>
          <li><strong>I</strong>nverse trigonometric functions: $\\arcsin(x)$, $\\arccos(x)$, $\\arctan(x)$</li>
          <li><strong>A</strong>lgebraic functions: $x$, $x^2$, polynomials</li>
          <li><strong>T</strong>rigonometric functions: $\\sin(x)$, $\\cos(x)$</li>
          <li><strong>E</strong>xponential functions: $e^x$, $a^x$</li>
        </ol>
        <p>The function that comes first in this list should be chosen as $u$. The remaining function is $dv$.</p>
      </div>

      <div class="concept-card">
        <h2>Repeated Integration by Parts</h2>
        <p>Some integrals require applying integration by parts multiple times. The <strong>tabular method</strong> (or integration by parts table) efficiently handles repeated applications by setting up columns of derivatives and antiderivatives.</p>
      </div>

      <div class="tip-box">
